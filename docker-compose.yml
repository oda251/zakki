services:
  zakki-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # args:
      #   WITH_ZENZ: "1"        # zenz GGUF（文脈校正）を焼く場合
    ports:
      # 3777 の既定値定義は packages/core/src/config/env.ts の DEFAULT_WEB_PORT（issue #56）。
      # compose からは TS を参照できないため、変更時はここと apps/web/Dockerfile も揃える
      - "3777:3777"
    volumes:
      - zakki-data:/data
    # web サーバは DEK を持たず復号しない（#45）: ZAKKI_ENCRYPTION / ZAKKI_NO_EMBEDDING は
    # サーバでは参照されない（TUI 専用）。アンロックはクライアント（ブラウザ）が行う

volumes:
  zakki-data:
