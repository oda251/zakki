# CI: lint / typecheck / test / build（issue #30）
# lefthook の pre-commit はローカルでスキップ可能なため、main へのマージ品質を CI で保証する。
# 備考:
# - trustedDependencies（onnxruntime-node, protobufjs）の postinstall は
#   bun install がルート package.json の宣言に従い自動実行する
# - packages/backend の embedding 統合テストは初回に ruri-v3-30m ONNX モデル
#   （約37MB）を HuggingFace からダウンロードする（テスト側 timeout 180s）
# - anco 実バイナリ統合テストは skipIf(!hasAnco) で CI では skip される
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build web
        working-directory: apps/web
        run: bun run build
