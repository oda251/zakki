# anco（AzooKeyKanaKanjiConverter の CLI）の Linux x64 バイナリを自前ビルドして
# Release に添付する。upstream はプレビルドバイナリを配布していないため
# （全リリースで assets なし）、本リポジトリの CI でビルドする。
# 構成は upstream の .github/workflows/swift.yml（ubuntu-24.04 + Swift 6.1 +
# プレビルド llama.cpp .so）に ZenzaiCPU trait と静的 Swift stdlib を加えたもの。
name: build-anco

on:
  workflow_dispatch:
    inputs:
      anco_ref:
        description: "AzooKeyKanaKanjiConverter の git ref"
        default: "v0.11.2"
        required: true
      llama_tag:
        description: "fkunn1326/llama.cpp のプレビルド release tag"
        default: "b4846"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Swift 6.1
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE

      - name: Checkout AzooKeyKanaKanjiConverter
        uses: actions/checkout@v6
        with:
          repository: azooKey/AzooKeyKanaKanjiConverter
          ref: ${{ inputs.anco_ref }}
          submodules: true

      - name: Download prebuilt llama.cpp
        run: |
          wget -q -O llama-cpp-bin.zip "https://github.com/fkunn1326/llama.cpp/releases/download/${{ inputs.llama_tag }}/llama-${{ inputs.llama_tag }}-bin-ubuntu-x64.zip"
          unzip -q llama-cpp-bin.zip -d llama-cpp-bin
          cp llama-cpp-bin/build/bin/lib*.so ./

      # --static-swift-stdlib は C++ interop と非互換（静的版 libswiftCxx が
      # toolchain に存在しない）ため、動的リンクし Swift ランタイムを同梱する。
      # -Xcxx -xobjective-c++（install_cli.sh 由来）は macOS 専用で、Linux では
      # GNU ObjC ランタイム参照（__gnu_objc_personality_v0）を生むため付けない
      # trait は ZenzaiCPU ではなく Zenzai を使う。ZenzaiCPU は split_mode=NONE を
      # 設定するが、llama.cpp b4846 は split_mode=NONE 時に main_gpu がデバイス
      # 一覧（CPU ビルドでは 0 個）の範囲内であることを要求し必ずロードに失敗する
      # （WSL2 実測）。CPU 専用 .so なら Zenzai trait でも GPU オフロードは発生しない
      # （fcitx5-hazkey と同構成）
      - name: Build anco (Zenzai + CPU llama)
        run: swift build -c release --traits Zenzai -Xswiftc -strict-concurrency=complete -Xlinker -L./

      - name: Package
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq patchelf
          mkdir -p dist
          cp .build/release/CliTool dist/anco
          cp -r .build/release/*.resources dist/
          cp lib*.so dist/
          # Swift ランタイム等、システム標準（glibc 系）以外の依存 .so を同梱する。
          # llama.cpp の .so はこの時点で未解決（not found）だが上で同梱済み
          ldd .build/release/CliTool | awk '/=> \// {print $3}' | while read -r lib; do
            case "$lib" in
              /lib/*|/usr/lib/x86_64-linux-gnu/*) ;;
              *) cp --update=none "$lib" dist/ ;;
            esac
          done
          # 同梱 .so をバイナリと同じディレクトリから解決できるようにする。
          # 実行ファイルの rpath だけでは libllama.so → libggml.so 等の
          # 間接依存が cwd 依存になる（WSL2 実測）ため、全 .so にも付与する
          patchelf --force-rpath --set-rpath '$ORIGIN' dist/anco
          for so in dist/*.so; do
            patchelf --force-rpath --set-rpath '$ORIGIN' "$so"
          done
          # 再配布物のライセンス文書
          cp LICENSE dist/LICENSE.AzooKeyKanaKanjiConverter
          cp Sources/KanaKanjiConverterModuleWithDefaultDictionary/azooKey_dictionary_storage/LICENSE dist/LICENSE.azooKey_dictionary_storage
          curl -sL -o dist/LICENSE.llama.cpp "https://raw.githubusercontent.com/ggml-org/llama.cpp/master/LICENSE"
          {
            echo "anco (AzooKeyKanaKanjiConverter CLI) Linux x64 build"
            echo
            echo "- engine: https://github.com/azooKey/AzooKeyKanaKanjiConverter @ ${{ inputs.anco_ref }} (MIT)"
            echo "- dictionary: azooKey_dictionary_storage submodule (Apache-2.0)"
            echo "- emoji dictionary: azooKey_emoji_dictionary_storage submodule (no LICENSE file; generated from Unicode data)"
            echo "- llama.cpp: prebuilt .so from https://github.com/fkunn1326/llama.cpp @ ${{ inputs.llama_tag }} (MIT)"
            echo "- Swift runtime: bundled .so files from Swift 6.1 toolchain (Apache-2.0 with Runtime Library Exception)"
            echo "- zenz model is NOT included (CC-BY-SA 4.0; download separately)"
            echo "- built on ubuntu-24.04 (glibc 2.39), Swift 6.1, traits: Zenzai (CPU-only llama .so)"
          } > dist/PROVENANCE.txt

      - name: Verify portability and smoke test
        run: |
          file dist/anco
          ls dist/
          if ldd dist/anco | grep 'not found'; then
            echo "::error::unresolved shared library dependencies"
            exit 1
          fi
          ./dist/anco にほんごにゅうりょく -n 3 --disable_prediction

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar -czf "anco-${{ inputs.anco_ref }}-linux-x64.tar.gz" -C dist .
          tag="anco-${{ inputs.anco_ref }}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" --repo "${{ github.repository }}" --clobber \
              "anco-${{ inputs.anco_ref }}-linux-x64.tar.gz"
          else
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --title "anco ${{ inputs.anco_ref }} (linux-x64)" \
              --notes-file dist/PROVENANCE.txt \
              "anco-${{ inputs.anco_ref }}-linux-x64.tar.gz"
          fi
