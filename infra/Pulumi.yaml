name: zakki-infra
runtime: nodejs
description: >-
  zakki のクラウドインフラ（Phase 3: Turso DB + secrets）。
  静的インフラのみを宣言的に管理する。ユーザごとの Turso DB は実行時に
  Turso Platform API で生成するため、ここでは管理しない（Phase 7 / RESEARCH.md §7）。

# Turso プロバイダは Terraform ブリッジのローカルパッケージとして導入する。
# 下の packages 定義から `pulumi install` が SDK を sdks/turso に再生成する
# （生成物は .gitignore 済み。生成パッケージ名は @pulumi/turso — 検証済み）。
packages:
  turso:
    source: pulumi/pulumi/terraform-provider
    version: 1.1.4
    parameters:
      - celest-dev/turso
